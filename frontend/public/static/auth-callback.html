<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Astrogen</title>
</head>
<body>
  <p style="font-family: system-ui; padding: 24px;">Вход выполняется…</p>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var t = p.get('token');
      if (t) {
        try { sessionStorage.setItem('astrogen_jwt', t); } catch (e) {}
      }
      window.location.replace('/');
    })();
  </script>
</body>
</html>
