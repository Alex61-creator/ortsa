<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrogen — Авторизация</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1677FF;
  --primary-light: #E6F4FF;
  --primary-border: #91CAFF;
  --primary-hover: #0958D9;
  --border: #D9D9D9;
  --bg: #FFFFFF;
  --bg-secondary: #F5F5F5;
  --text: rgba(0,0,0,0.88);
  --text-2: rgba(0,0,0,0.65);
  --text-3: rgba(0,0,0,0.45);
  --text-4: rgba(0,0,0,0.25);
  --tg: #2AABEE;
  --tg-dark: #0088CC;
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --r: 8px; --r-lg: 12px;
}
[data-theme="dark"] {
  --bg: #1F1F1F; --bg-secondary: #141414;
  --border: #424242;
  --text: rgba(255,255,255,0.88); --text-2: rgba(255,255,255,0.65);
  --text-3: rgba(255,255,255,0.45); --text-4: rgba(255,255,255,0.2);
  --primary-light: rgba(22,119,255,0.12); --primary-border: rgba(22,119,255,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: #F0F2F5; min-height: 100vh; }

/* ── NAVBAR (demo) ── */
.navbar {
  background: var(--bg); border-bottom: 1px solid var(--border);
  height: 64px; display: flex; align-items: center; padding: 0 24px;
  gap: 32px; position: relative; z-index: 10;
}
.navbar-logo {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-size: 22px; color: var(--text);
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--primary); display: flex; align-items: center; justify-content: center;
}
.navbar-nav { display: flex; gap: 2px; margin: 0 auto; }
.nav-link {
  font-size: 14px; color: var(--text-2); padding: 6px 14px;
  border-radius: var(--r); transition: all 0.15s; cursor: pointer;
  border: none; background: none; font-family: var(--font);
}
.nav-link:hover { color: var(--text); background: var(--bg-secondary); }
.navbar-right { display: flex; align-items: center; gap: 10px; }
.lang-switch { display: flex; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.lang-btn {
  font-size: 13px; font-weight: 500; padding: 5px 11px;
  border: none; background: none; color: var(--text-3); cursor: pointer; font-family: var(--font);
}
.lang-btn.on { background: var(--primary); color: #fff; }
.theme-btn {
  width: 36px; height: 36px; border-radius: var(--r);
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; font-size: 16px; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.theme-btn:hover { border-color: var(--primary); }
.btn-enter {
  padding: 8px 20px; border-radius: var(--r);
  background: var(--primary); color: #fff; border: none;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-enter:hover { background: var(--primary-hover); }

/* ── PAGE CONTENT (demo) ── */
.page-hint {
  padding: 40px 24px; text-align: center;
  font-size: 14px; color: var(--text-3);
}

/* ── OVERLAY ── */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0); backdrop-filter: blur(0px);
  pointer-events: none; transition: all 0.25s;
}
.overlay.open {
  background: rgba(0,0,0,0.22); backdrop-filter: blur(2px);
  pointer-events: all;
}

/* ── AUTH DROPDOWN ── */
.auth-popup {
  position: fixed; top: 72px; right: 24px; z-index: 200;
  width: 320px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  transform-origin: top right;
  transform: scale(0.95) translateY(-8px);
  opacity: 0; pointer-events: none;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s ease;
  overflow: hidden;
}
.auth-popup.open {
  transform: scale(1) translateY(0);
  opacity: 1; pointer-events: all;
}

/* Arrow */
.auth-popup::before {
  content: '';
  position: absolute; top: -6px; right: 30px;
  width: 12px; height: 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-bottom: none; border-right: none;
  transform: rotate(45deg);
}

/* Top band */
.popup-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.popup-brand-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--primary); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.popup-brand-text { flex: 1; }
.popup-brand-name { font-family: var(--font-display); font-size: 17px; color: var(--text); }
.popup-brand-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* Body */
.popup-body { padding: 14px 16px 16px; }
.popup-label {
  font-size: 11px; font-weight: 500; color: var(--text-4);
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px;
}

/* Auth buttons */
.auth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.auth-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 9px 12px; border-radius: var(--r);
  border: 1px solid var(--border); background: var(--bg);
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text); cursor: pointer; transition: all 0.15s;
}
.auth-btn:hover { border-color: var(--primary-border); background: var(--primary-light); color: var(--primary); }
.auth-btn:active { transform: scale(0.97); }
.auth-btn.tg {
  background: rgba(42,171,238,0.07); border-color: rgba(42,171,238,0.45); color: var(--tg-dark);
}
.auth-btn.tg:hover { background: rgba(42,171,238,0.14); border-color: var(--tg); }
.auth-btn.full { grid-column: span 2; }

/* Divider */
.popup-divider {
  display: flex; align-items: center; gap: 10px; margin: 12px 0;
}
.popup-divider::before, .popup-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.popup-divider span { font-size: 11px; color: var(--text-4); }

/* Loading state */
.loading-overlay {
  display: none; position: absolute; inset: 0; z-index: 10;
  background: rgba(255,255,255,0.82); backdrop-filter: blur(2px);
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  border-radius: var(--r-lg);
}
[data-theme="dark"] .loading-overlay { background: rgba(31,31,31,0.85); }
.loading-overlay.show { display: flex; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-2); }

/* Footer */
.popup-footer {
  padding: 10px 16px 12px;
  border-top: 1px solid var(--border); background: var(--bg-secondary);
  font-size: 11px; color: var(--text-4); line-height: 1.6; text-align: center;
}
.popup-footer a { color: var(--text-3); text-decoration: underline; text-underline-offset: 2px; }

/* ── SUCCESS STATE ── */
.success-state {
  display: none; padding: 18px 18px 20px; text-align: center;
}
.success-state.show { display: block; }
.success-check {
  width: 48px; height: 48px; border-radius: 50%;
  background: #F6FFED; border: 2px solid #B7EB8F;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin: 0 auto 12px;
}
.success-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.success-email { font-size: 13px; color: var(--text-3); margin-bottom: 16px; }
.btn-go-cabinet {
  width: 100%; padding: 10px; border-radius: var(--r);
  background: var(--primary); color: #fff; border: none;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.15s; margin-bottom: 8px;
}
.btn-go-cabinet:hover { background: var(--primary-hover); }
.btn-logout {
  font-family: var(--font); font-size: 12px; color: var(--text-3);
  background: none; border: none; cursor: pointer; text-decoration: underline;
  text-underline-offset: 3px;
}
.btn-logout:hover { color: var(--text); }
.auth-main { }
.auth-main.hidden { display: none; }
</style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar">
  <a href="#" class="navbar-logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="8.5" stroke="white" stroke-width="1"/>
        <circle cx="10" cy="10" r="5" stroke="white" stroke-width="0.8" opacity="0.6"/>
        <circle cx="10" cy="1.5" r="2" fill="white"/>
        <circle cx="17" cy="6" r="1.5" fill="white" opacity="0.85"/>
      </svg>
    </div>
    Astrogen
  </a>
  <div class="navbar-nav">
    <button class="nav-link">О сервисе</button>
    <button class="nav-link">Пример</button>
    <button class="nav-link">Тарифы</button>
    <button class="nav-link">О нас</button>
    <button class="nav-link">FAQ</button>
  </div>
  <div class="navbar-right">
    <div class="lang-switch">
      <button class="lang-btn on">RU</button>
      <button class="lang-btn">EN</button>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">☀</button>
    <button class="btn-enter" id="btn-enter" onclick="toggleAuth()">Войти</button>
  </div>
</nav>

<div class="page-hint">← Нажми «Войти» чтобы открыть окно авторизации</div>

<!-- ── OVERLAY ── -->
<div class="overlay" id="overlay" onclick="closeAuth()"></div>

<!-- ── AUTH POPUP ── -->
<div class="auth-popup" id="authPopup">

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Вход через Google…</div>
  </div>

  <!-- BRAND HEADER -->
  <div class="popup-brand">
    <div class="popup-brand-icon">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="8.5" stroke="white" stroke-width="1"/>
        <circle cx="10" cy="1.5" r="2" fill="white"/>
      </svg>
    </div>
    <div class="popup-brand-text">
      <div class="popup-brand-name">Astrogen</div>
      <div class="popup-brand-sub">Личный кабинет</div>
    </div>
    <button onclick="closeAuth()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-4);padding:2px 4px;line-height:1;margin-left:auto;">×</button>
  </div>

  <!-- AUTH FORM -->
  <div class="auth-main" id="authMain">
    <div class="popup-body">
      <div class="popup-label">Войти одним из способов</div>

      <!-- Telegram — full width -->
      <div class="auth-row" style="grid-template-columns:1fr;margin-bottom:8px;">
        <button class="auth-btn tg full" onclick="doLogin('telegram','Telegram','alexey@telegram.org')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="var(--tg-dark)"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.247l-2.04 9.607c-.154.676-.555.84-1.124.522l-3.1-2.285-1.496 1.44c-.166.166-.305.305-.625.305l.222-3.162 5.748-5.19c.25-.222-.054-.345-.387-.123L7.22 14.242l-3.035-.947c-.66-.206-.673-.66.137-.977l11.857-4.574c.548-.2 1.03.133.383.503z"/></svg>
          Войти через Telegram
        </button>
      </div>

      <div class="popup-divider"><span>или через браузер</span></div>

      <!-- OAuth row -->
      <div class="auth-row">
        <button class="auth-btn" onclick="doLogin('google','Google','user@gmail.com')">
          <svg width="15" height="15" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="auth-btn" onclick="doLogin('yandex','Яндекс','user@yandex.ru')">
          <div style="width:15px;height:15px;background:#FC3F1D;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="9" height="9" viewBox="0 0 12 12" fill="white"><text x="6" y="9.5" text-anchor="middle" font-size="9" font-weight="bold" font-family="serif">Я</text></svg>
          </div>
          Яндекс
        </button>
        <button class="auth-btn" onclick="doLogin('apple','Apple','user@icloud.com')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text)"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
        <button class="auth-btn" onclick="doLogin('vk','VK','user@vk.com')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#2787F5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.5 13.5h-1.7c-.64 0-.84-.51-2-1.67-.97-.97-1.4-.96-1.66-.96-.36 0-.46.1-.46.58v1.52c0 .41-.13.65-1.22.65-1.8 0-3.8-1.1-5.2-3.13C2.5 9.87 2.13 7.5 2.13 7.5c0-.27.1-.52.58-.52H4.4c.44 0 .6.2.77.67.84 2.43 2.26 4.56 2.84 4.56.22 0 .32-.1.32-.65V9.43c-.07-1.17-.68-1.27-.68-1.68 0-.2.16-.4.42-.4h2.67c.36 0 .48.2.48.62v3.33c0 .36.16.48.27.48.22 0 .4-.12.8-.52 1.23-1.38 2.1-3.5 2.1-3.5.12-.25.31-.48.75-.48h1.7c.5 0 .61.26.5.62-.22.97-2.36 4.05-2.36 4.05-.19.3-.26.44 0 .77.18.25.79.77 1.19 1.24.74.84 1.3 1.55 1.46 2.04.13.43-.09.65-.55.65z"/></svg>
          VK
        </button>
      </div>
    </div>

    <div class="popup-footer">
      Входя, вы принимаете <a href="#">Оферту</a> и <a href="#">Политику конфиденциальности</a>
    </div>
  </div>

  <!-- SUCCESS STATE (after login) -->
  <div class="success-state" id="successState">
    <div class="success-check">✓</div>
    <div class="success-name" id="s-name">Алексей</div>
    <div class="success-email" id="s-email">user@gmail.com</div>
    <button class="btn-go-cabinet" onclick="goToCabinet()">
      Открыть личный кабинет →
    </button>
    <button class="btn-logout" onclick="doLogout()">Выйти</button>
  </div>

</div><!-- /auth-popup -->

<script>
let isOpen = false;
let isLoggedIn = false;

function toggleAuth() {
  isOpen ? closeAuth() : openAuth();
}
function openAuth() {
  isOpen = true;
  document.getElementById('authPopup').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeAuth() {
  isOpen = false;
  document.getElementById('authPopup').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function doLogin(provider, label, email) {
  // Show loading
  const lo = document.getElementById('loadingOverlay');
  document.getElementById('loadingText').textContent = `Вход через ${label}…`;
  lo.classList.add('show');

  setTimeout(() => {
    lo.classList.remove('show');
    // Show success
    document.getElementById('authMain').classList.add('hidden');
    document.getElementById('successState').classList.add('show');
    document.getElementById('s-email').textContent = email;
    // Update navbar button
    const btn = document.getElementById('btn-enter');
    btn.textContent = '✦ Кабинет';
    btn.style.background = '#52C41A';
    isLoggedIn = true;
  }, 1300);
}

function doLogout() {
  document.getElementById('authMain').classList.remove('hidden');
  document.getElementById('successState').classList.remove('show');
  const btn = document.getElementById('btn-enter');
  btn.textContent = 'Войти';
  btn.style.background = '';
  isLoggedIn = false;
}

function goToCabinet() {
  closeAuth();
  alert('→ Переход в личный кабинет (/cabinet)');
}

function toggleTheme() {
  const h = document.documentElement;
  h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape' && isOpen) closeAuth(); });
</script>
</body>
</html>
