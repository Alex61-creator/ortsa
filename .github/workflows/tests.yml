name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Verify static landing markers
        run: |
          grep -q 'meta name="api-base"' static/index.html
          grep -q '__SITE_BASE_URL__' static/index.html
      - name: Run pytest
        run: pytest -q
